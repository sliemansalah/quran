<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>خريطة الحفظ</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #c8a96e;
      background-image: radial-gradient(ellipse at center, #d4b483 0%, #a07840 100%);
      height: 100vh;
      overflow: hidden;
      font-family: 'Traditional Arabic', 'Arial', serif;
      display: flex;
      flex-direction: column;
    }

    #nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 6px 20px;
      background: rgba(0,0,0,0.25);
      flex-shrink: 0;
    }
    #nav-bar button {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 3px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: background 0.2s;
    }
    #nav-bar button:hover { background: rgba(255,255,255,0.3); }
    #nav-bar button:disabled { opacity: 0.35; cursor: default; }
    #spread-label { color: #fff; font-size: 13px; min-width: 80px; text-align: center; }

    #book {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 8px 16px 4px;
      min-height: 0;
      gap: 0;
    }

    .page {
      flex: 1;
      background: #fffdf5;
      display: none;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .page.active { display: flex; }
    .page.right-page {
      border-radius: 4px 0 0 4px;
      box-shadow: -4px 0 12px rgba(0,0,0,0.2), inset -2px 0 6px rgba(0,0,0,0.05);
    }
    .page.left-page {
      border-radius: 0 4px 4px 0;
      box-shadow: 4px 0 12px rgba(0,0,0,0.2), inset 2px 0 6px rgba(0,0,0,0.05);
    }

    #spine {
      width: 28px;
      flex-shrink: 0;
      background: linear-gradient(to right,
        #8B6914 0%, #c9a227 25%, #e8c84a 45%,
        #f5e070 50%, #e8c84a 55%, #c9a227 75%, #8B6914 100%);
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      z-index: 10;
    }

    .page-num {
      position: absolute;
      bottom: 8px;
      font-size: 11px;
      color: #888;
      z-index: 5;
    }
    .right-page .page-num { left: 12px; }
    .left-page  .page-num { right: 12px; }

    .page svg { width: 100%; height: 100%; display: block; }

    .blank-page {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 18px;
    }

    /* ══ Popup ══ */
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #popup-overlay.open { display: flex; }

    #popup-box {
      background: #fffdf5;
      border: 2px solid #c9a227;
      border-radius: 16px;
      padding: 28px 36px 20px;
      max-width: 78%;
      min-width: 300px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      position: relative;
      animation: popIn 0.18s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    #popup-label {
      font-size: 13px;
      color: #8B4513;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    #popup-verse {
      font-family: 'Amiri Quran', 'Traditional Arabic', serif;
      font-size: 24px;
      line-height: 1.9;
      color: #000;
      direction: rtl;
      margin-bottom: 16px;
    }
    #popup-verse .kw { color: #cc0000; font-weight: bold; }

    /* زر الصوت في البوبأب */
    #popup-audio-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .audio-btn {
      background: linear-gradient(135deg, #c9a227, #8B6914);
      border: none;
      color: #fff;
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .audio-btn:hover { opacity: 0.88; transform: scale(1.03); }
    .audio-btn:active { transform: scale(0.97); }
    .audio-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }
    #audio-status { font-size: 11px; color: #999; min-width: 80px; }

    #popup-close {
      position: absolute;
      top: 10px;
      left: 14px;
      background: none;
      border: none;
      font-size: 22px;
      color: #aaa;
      cursor: pointer;
      line-height: 1;
    }
    #popup-close:hover { color: #555; }

    /* ── الرابط الذهني أسفل الصفحة ── */
    .mental-link-bar {
      position: absolute;
      bottom: 22px;
      left: 10px;
      right: 10px;
      background: linear-gradient(135deg, rgba(201,162,39,0.13), rgba(139,105,20,0.18));
      border: 1.5px solid rgba(201,162,39,0.5);
      border-radius: 10px;
      padding: 5px 10px;
      text-align: center;
      z-index: 4;
      pointer-events: none;
    }

    .clickable { cursor: pointer; }
    .clickable:hover .box-bg { filter: brightness(0.94); }

    /* زر صوت صغير فوق الصناديق */
    .audio-icon-btn {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .audio-icon-btn:hover { opacity: 1; }
  </style>
</head>
<body>

<div id="nav-bar">
  <button id="btn-next" onclick="turnPage(1)">&#x25C4; التالي</button>
  <span id="spread-label">ص ١–٢</span>
  <button id="btn-prev" onclick="turnPage(-1)" disabled>السابق &#x25BA;</button>
</div>

<div id="book">
  <div class="page right-page active" id="right-page">
    <span class="page-num" id="right-num">١</span>
  </div>
  <div id="spine"></div>
  <div class="page left-page active" id="left-page">
    <span class="page-num" id="left-num">٢</span>
  </div>
</div>

<!-- Popup -->
<div id="popup-overlay" onclick="closePopup()">
  <div id="popup-box" onclick="event.stopPropagation()">
    <button id="popup-close" onclick="closePopup()">&#x2715;</button>
    <div id="popup-label"></div>
    <div id="popup-verse"></div>
    <div id="popup-audio-area">
      <button class="audio-btn" id="play-btn" onclick="playAyah()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        استمع بصوت الشيخ ياسر الدوسري
      </button>
      <span id="audio-status"></span>
    </div>
  </div>
</div>

<audio id="ayah-audio" preload="none"></audio>

<script>
// ══════════════════════════════════════════
// بيانات الآيات + الصوت
// ══════════════════════════════════════════
const _popupData = {};
let _currentAudio = { surah: 0, ayah: 0, ayahEnd: 0 };

const audioEl = document.getElementById('ayah-audio');
const statusEl = document.getElementById('audio-status');
const playBtn  = document.getElementById('play-btn');

// حساب رقم الآية المتسلسل في المصحف كاملاً (لـ islamic.network)
const SURAH_STARTS = [0,1,8,294,493,669,789,954,1160,1235,1364,1473,1596,1707,1750,1802,1901,2029,2140,2250,2348,2483,2595,2673,2791,2855,2932,3159,3252,3340,3409,3469,3503,3533,3606,3660,3704,3750,3896,3970,4058,4133,4218,4272,4325,4414,4473,4510,4545,4583,4612,4630,4675,4735,4784,4846,4901,4979,5075,5104,5126,5150,5163,5177,5188,5199,5217,5227,5241,5271,5323,5375,5419,5447,5475,5495,5551,5591,5622,5672,5712,5756,5800,5829,5848,5884,5909,5931,5948,5967,5993,6023,6043,6058,6079,6090,6098,6106,6125,6130,6138,6146,6157,6168,6176,6179,6188,6197,6204,6207,6213,6216,6221,6225,6230,6236,6243];
function ayahGlobalNum(surah, ayah) {
  return (SURAH_STARTS[surah] || 0) + ayah;
}

function ayahAudioURLs(surah, ayahNum) {
  const s = String(surah).padStart(3,'0');
  const a = String(ayahNum).padStart(3,'0');
  const g = ayahGlobalNum(surah, ayahNum);
  return [
    // المصدر الأساسي — everyayah.com (الاسم الصحيح: Dussary بحرفين ss)
    `https://everyayah.com/data/Yasser_Ad-Dussary_128kbps/${s}${a}.mp3`,
    // بديل 1 — islamic.network
    `https://cdn.islamic.network/quran/audio/128/ar.yaseraldossari/${g}.mp3`,
    // بديل 2 — mp3quran.net
    `https://server8.mp3quran.net/aldosri/${s}${a}.mp3`,
    // بديل 3 — quranicaudio
    `https://download.quranicaudio.com/quran/yasser_ad-dossary/${s}${a}.mp3`,
  ];
}

let _urlIdx = 0;
let _urlList = [];

function playAyah() {
  const d = _currentAudio;
  if (!d.surah) return;
  _urlList = ayahAudioURLs(d.surah, d.ayahStart);
  _urlIdx = 0;
  tryPlayFrom(0);
}

function tryPlayFrom(idx) {
  if (idx >= _urlList.length) {
    statusEl.textContent = '⚠ تعذّر التشغيل';
    playBtn.disabled = false;
    return;
  }
  _urlIdx = idx;
  statusEl.textContent = '⏳ جارٍ التحميل...';
  playBtn.disabled = true;
  audioEl.src = _urlList[idx];
  audioEl.load();

  const onCanPlay = () => {
    audioEl.removeEventListener('canplaythrough', onCanPlay);
    audioEl.removeEventListener('error', onErr);
    audioEl.play().catch(() => tryPlayFrom(idx + 1));
  };
  const onErr = () => {
    audioEl.removeEventListener('canplaythrough', onCanPlay);
    audioEl.removeEventListener('error', onErr);
    tryPlayFrom(idx + 1);
  };
  audioEl.addEventListener('canplaythrough', onCanPlay);
  audioEl.addEventListener('error', onErr);

  // timeout إن لم يستجب خلال 5 ثوانٍ
  setTimeout(() => {
    if (audioEl.readyState < 3 && audioEl.src === _urlList[idx]) {
      audioEl.removeEventListener('canplaythrough', onCanPlay);
      audioEl.removeEventListener('error', onErr);
      tryPlayFrom(idx + 1);
    }
  }, 5000);
}

audioEl.addEventListener('play',  () => { statusEl.textContent = '▶ يُشغَّل'; playBtn.disabled = false; });
audioEl.addEventListener('ended', () => { statusEl.textContent = '✓ انتهى'; playBtn.disabled = false; });

// ══════════════════════════════════════════
// Popup
// ══════════════════════════════════════════
function showPopup(label, html, surah, ayahStart, ayahEnd) {
  document.getElementById('popup-label').textContent = label;
  document.getElementById('popup-verse').innerHTML = html;
  _currentAudio = { surah, ayahStart: ayahStart || 1, ayahEnd: ayahEnd || ayahStart || 1 };
  statusEl.textContent = '';
  audioEl.pause();
  audioEl.src = '';
  document.getElementById('popup-overlay').classList.add('open');
}
function closePopup() {
  audioEl.pause();
  document.getElementById('popup-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

function attachClickHandler(svg) {
  svg.addEventListener('click', e => {
    const g = e.target.closest('[data-vkey]');
    if (!g) return;
    const v = _popupData[g.dataset.vkey];
    if (v) showPopup(v.label + '  ·  آية ' + v.ayah, v.html, v.surah, v.ayahStart, v.ayahEnd);
  });
}

// ══════════════════════════════════════════
// مساعد: صندوق قابل للضغط
// ══════════════════════════════════════════
function box(x, y, w, h, stroke, fill, label, ayah, keyword, vkey, showAyah=true) {
  const cx  = x + w / 2;
  const labelParts = label.split('\n');
  const labelH = 28 + (labelParts.length - 1) * 20;
  const kwY = y + labelH + Math.round((h - labelH - 20) / 2) + 14;
  const kwText = showAyah ? `${keyword} ﴿${ayah}﴾` : keyword;

  let labelSVG = '';
  labelParts.forEach((part, i) => {
    const fs = labelParts.length > 2 ? 15 : labelParts.length > 1 ? 17 : 20;
    labelSVG += `<text x="${cx}" y="${y + 26 + i*20}" font-family="Traditional Arabic,Arial" font-size="${fs}"
          font-weight="bold" text-anchor="middle" fill="${stroke}">${part}</text>`;
  });
  const lineY = y + 26 + (labelParts.length - 1) * 20 + 7;

  // أيقونة الصوت الصغيرة
  const iconX = x + w - 22, iconY = y + 6;
  const audioIcon = `
    <g class="audio-icon-btn" data-vkey="${vkey}">
      <circle cx="${iconX+8}" cy="${iconY+8}" r="9" fill="${stroke}" opacity="0.18"/>
      <polygon points="${iconX+5},${iconY+5} ${iconX+5},${iconY+11} ${iconX+13},${iconY+8}" fill="${stroke}"/>
    </g>`;

  return `
    <g class="clickable" data-vkey="${vkey}">
      <rect class="box-bg" x="${x}" y="${y}" width="${w}" height="${h}"
            fill="${fill}" stroke="${stroke}" stroke-width="2.5" rx="8"/>
      ${labelSVG}
      <line x1="${x+14}" y1="${lineY}" x2="${x+w-14}" y2="${lineY}"
            stroke="${stroke}" stroke-width="1.2" opacity="0.5"/>
      <text x="${cx}" y="${kwY}"
            font-family="'Amiri Quran','Traditional Arabic',serif"
            font-size="22" text-anchor="middle" font-weight="bold" fill="#cc0000">${kwText}</text>
      <text x="${cx}" y="${y+h-5}" font-family="Traditional Arabic,Arial" font-size="7.5"
            text-anchor="middle" fill="${stroke}" opacity="0.35">اضغط للآية + الاستماع</text>
      ${audioIcon}
    </g>`;
}

// ══════════════════════════════════════════
// الرابط الذهني
// ══════════════════════════════════════════
function mentalLinkHTML(from, arrow, to, color) {
  return `
  <div class="mental-link-bar">
    <svg viewBox="0 0 480 36" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:36px">
      <rect x="0" y="0" width="480" height="36" fill="none"/>
      <!-- من -->
      <rect x="2" y="6" width="145" height="24" rx="6" fill="${color}" opacity="0.15" stroke="${color}" stroke-width="1.2"/>
      <text x="74" y="22" font-family="'Amiri Quran','Traditional Arabic',serif" font-size="13"
            text-anchor="middle" fill="${color}" font-weight="bold">${from}</text>
      <!-- سهم -->
      <text x="240" y="24" font-family="Arial" font-size="20" text-anchor="middle" fill="${color}" opacity="0.7">${arrow}</text>
      <!-- إلى -->
      <rect x="333" y="6" width="145" height="24" rx="6" fill="${color}" opacity="0.15" stroke="${color}" stroke-width="1.2"/>
      <text x="405" y="22" font-family="'Amiri Quran','Traditional Arabic',serif" font-size="13"
            text-anchor="middle" fill="${color}" font-weight="bold">${to}</text>
    </svg>
  </div>`;
}

// ══════════════════════════════════════════
// صفحة 1 — الفاتحة
// ══════════════════════════════════════════
function buildPage1() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 520 720');

  Object.assign(_popupData, {
    p1_bas:  { label:'بسملة',           ayah:'١', html:'<span class="kw">بِسْمِ ٱللَّهِ</span> ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ', surah:1, ayahStart:1 },
    p1_hmd:  { label:'حمد',             ayah:'٢', html:'<span class="kw">ٱلْحَمْدُ لِلَّهِ</span> رَبِّ ٱلْعَـٰلَمِينَ', surah:1, ayahStart:2 },
    p1_rhm:  { label:'رحمة',            ayah:'٣', html:'<span class="kw">ٱلرَّحْمَـٰنِ</span> ٱلرَّحِيمِ', surah:1, ayahStart:3 },
    p1_mlk:  { label:'ملك',             ayah:'٤', html:'<span class="kw">مَالِكِ</span> يَوْمِ ٱلدِّينِ', surah:1, ayahStart:4 },
    p1_ikl:  { label:'إخلاص',          ayah:'٥', html:'<span class="kw">إِيَّاكَ</span> نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ', surah:1, ayahStart:5 },
    p1_hdy1: { label:'هداية',           ayah:'٦', html:'<span class="kw">ٱهْدِنَا</span> ٱلصِّرَٰطَ ٱلْمُسْتَقِيمَ', surah:1, ayahStart:6 },
    p1_hdy2: { label:'تخصيص الهداية', ayah:'٧', html:'<span class="kw">صِرَٰطَ</span> ٱلَّذِينَ أَنْعَمْتَ عَلَيْهِمْ<br>غَيْرِ ٱلْمَغْضُوبِ عَلَيْهِمْ وَلَا ٱلضَّآلِّينَ', surah:1, ayahStart:7 },
  });

  const G=10,M=12,W=496;
  const half=W/2-G/2;
  const basBox   = box(M+W/2-165, 58, 330, 88, '#2E7D32','#eef7ee','بسملة','١','بِسْمِ ٱللَّهِ','p1_bas');
  const rahmBox  = box(M, 156, half, 96, '#2E7D32','#eef7ee','رحمة','٣','ٱلرَّحْمَـٰنِ','p1_rhm',false);
  const hamdBox  = box(M+W/2+G/2, 156, half, 96, '#2E7D32','#eef7ee','حمد','٢','ٱلْحَمْدُ لِلَّهِ','p1_hmd',false);
  const malikBox = box(M+W/2+G/2, 264, half, 118, '#1565C0','#eef0fb','ملك','٤','مَالِكِ','p1_mlk');
  const iklBox   = box(M, 264, half, 118, '#1565C0','#eef0fb','إخلاص','٥','إِيَّاكَ','p1_ikl',false);
  const hdyBox   = box(M+W/2+G/2, 394, half, 108, '#E65100','#fef6ee','هداية','٦','ٱهْدِنَا','p1_hdy1');
  const tkhBox   = box(M, 394, half, 108, '#E65100','#fef6ee','تخصيص الهداية','٧','صِرَاطَ','p1_hdy2');

  const cx = M+W/2;
  svg.innerHTML = `
    <rect width="520" height="720" fill="#fffdf5"/>
    <rect x="0" y="0" width="520" height="54" fill="#dfc28a" stroke="#c9a227" stroke-width="2.5"/>
    <line x1="0" y1="54" x2="520" y2="54" stroke="#8B6914" stroke-width="2"/>
    <text x="14" y="34" font-family="Traditional Arabic,Arial" font-size="20" font-weight="bold" fill="#3E1F00">ص ١</text>
    <text x="260" y="24" font-family="Traditional Arabic,Arial" font-size="17" font-weight="bold" text-anchor="middle" fill="#3E1F00">سورة الفاتحة</text>
    <text x="260" y="44" font-family="Traditional Arabic,Arial" font-size="12" text-anchor="middle" fill="#6B3A10">٧ آيات · من آية ١ إلى آية ٧</text>
    <rect x="450" y="8" width="58" height="32" fill="#c9a227" stroke="#8B6914" stroke-width="1.5" rx="14"/>
    <text x="479" y="30" font-family="Traditional Arabic,Arial" font-size="14" text-anchor="middle" fill="#fff" font-weight="bold">١–٧</text>
    <line x1="${cx}" y1="146" x2="${M+half/2}" y2="156" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <line x1="${cx}" y1="146" x2="${M+W/2+G/2+half/2}" y2="156" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    ${basBox}${rahmBox}${hamdBox}${malikBox}${iklBox}${hdyBox}${tkhBox}
    <!-- الرابط الذهني -->
    <rect x="10" y="514" width="500" height="46" rx="10" fill="rgba(201,162,39,0.10)" stroke="rgba(201,162,39,0.5)" stroke-width="1.5"/>
    <text x="260" y="530" font-family="Traditional Arabic,Arial" font-size="11" text-anchor="middle" fill="#8B6914" opacity="0.8">🔗 الرابط الذهني</text>
    <text x="260" y="550" font-family="'Amiri Quran','Traditional Arabic',serif" font-size="14" text-anchor="middle" fill="#5D3A00">ابدأ بـ بِسْمِ ٱللَّهِ  ←  لتصل إلى  صِرَاطَ ٱلَّذِينَ أَنْعَمْتَ عَلَيْهِمْ</text>
    <text x="14" y="712" font-family="Traditional Arabic,Arial" font-size="10" fill="#aaa">آخر آية: ٧</text>
    <text x="260" y="712" font-family="Traditional Arabic,Arial" font-size="10" text-anchor="middle" fill="#ccc">اضغط على أي صندوق لرؤية الآية والاستماع إليها</text>
  `;
  attachClickHandler(svg);
  return svg;
}

// ══════════════════════════════════════════
// صفحة 2 — البقرة ١–٥
// ══════════════════════════════════════════
function buildPage2() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 520 720');

  Object.assign(_popupData, {

  const t1topY=58; const t1topH=80;
  const narBox = box(M+W/2-155, t1topY, 310, t1topH, '#2E7D32','#eef7ee','مثل ناري — لا يبصرون','١٧','مَثَلُهُمْ كَنَارٍ','p4_mth_nar');
  const t1botY=t1topY+t1topH+G;
  const smmBox = box(M+W/2+G/2, t1botY, half, 82, '#2E7D32','#eef7ee','صُمٌّ — لا يرجعون','١٨','صُمٌّ بُكْمٌ','p4_mth_smm');
  const maaBox = box(M, t1botY, half, 82, '#2E7D32','#eef7ee','مثل مائي\n(محيط بالكافرين)','١٩–٢٠','كَصَيِّبٍ','p4_mth_maa');

  const t2topY=t1botY+82+G; const t2topH=80;
  const brqBox = box(M+W/2-155, t2topY, 310, t2topH, '#1565C0','#eef0fb','البرق — دليل القدرة','٢٠','يَكَادُ ٱلْبَرْقُ','p4_brq_dll');
  const t2botY=t2topY+t2topH+G;
  const ndaBox = box(M+W/2+G/2, t2botY, half, 90, '#1565C0','#eef0fb','أول نداء\n(العبادة → التقوى)','٢١','يَـٰٓأَيُّهَا ٱلنَّاسُ','p4_nda_ibd');
  const wsmBox = box(M, t2botY, half, 90, '#1565C0','#eef0fb','تسخير الوسائل\nوأنتم تعلمون\n(موصول مفرد)','٢٢','ٱلَّذِى جَعَلَ','p4_nda_wsm');

  const rectY=t2botY+90+G; const rectH=84;
  const tcdBox = box(M, rectY, W, rectH, '#B71C1C','#fdecea','تحدي الصدق وفشله\nنار حقيقية أعدت للكافرين','٢٣','وَإِن كُنتُمْ فِى رَيْبٍ','p4_tcd_all');

  const lnkY = rectY+rectH+8;

  svg.innerHTML = `
    <rect width="520" height="730" fill="#fffdf5"/>
    <rect x="0" y="0" width="520" height="54" fill="#dfc28a" stroke="#c9a227" stroke-width="2.5"/>
    <line x1="0" y1="54" x2="520" y2="54" stroke="#8B6914" stroke-width="2"/>
    <text x="14" y="34" font-family="Traditional Arabic,Arial" font-size="20" font-weight="bold" fill="#3E1F00">ص ٤</text>
    <text x="260" y="24" font-family="Traditional Arabic,Arial" font-size="17" font-weight="bold" text-anchor="middle" fill="#3E1F00">سورة البقرة</text>
    <text x="260" y="44" font-family="Traditional Arabic,Arial" font-size="12" text-anchor="middle" fill="#6B3A10">٧ آيات · من آية ١٧ إلى آية ٢٣</text>
    <rect x="450" y="8" width="58" height="32" fill="#c9a227" stroke="#8B6914" stroke-width="1.5" rx="14"/>
    <text x="479" y="30" font-family="Traditional Arabic,Arial" font-size="14" text-anchor="middle" fill="#fff" font-weight="bold">١٧–٢٣</text>

    <line x1="${cx}" y1="${t1topY+t1topH}" x2="${M+half/2}" y2="${t1botY}" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <line x1="${cx}" y1="${t1topY+t1topH}" x2="${M+W/2+G/2+half/2}" y2="${t1botY}" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <line x1="${cx}" y1="${t2topY+t2topH}" x2="${M+half/2}" y2="${t2botY}" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <line x1="${cx}" y1="${t2topY+t2topH}" x2="${M+W/2+G/2+half/2}" y2="${t2botY}" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

    ${narBox}${smmBox}${maaBox}${brqBox}${ndaBox}${wsmBox}${tcdBox}

    <!-- الرابط الذهني -->
    <rect x="10" y="${lnkY}" width="500" height="46" rx="10" fill="rgba(230,81,0,0.07)" stroke="rgba(230,81,0,0.4)" stroke-width="1.5"/>
    <text x="260" y="${lnkY+16}" font-family="Traditional Arabic,Arial" font-size="11" text-anchor="middle" fill="#E65100" opacity="0.8">🔗 الرابط الذهني</text>
    <text x="260" y="${lnkY+36}" font-family="'Amiri Quran','Traditional Arabic',serif" font-size="13" text-anchor="middle" fill="#7B2800">الأمثال تُظهر العجز  ←  النداء بالعبادة  ←  التحدي والنار</text>

    <text x="14"  y="722" font-family="Traditional Arabic,Arial" font-size="10" fill="#aaa">آخر آية: ٢٣</text>
    <text x="260" y="722" font-family="Traditional Arabic,Arial" font-size="10" text-anchor="middle" fill="#ccc">اضغط على أي صندوق لرؤية الآية والاستماع إليها</text>
  `;
  attachClickHandler(svg);
  return svg;
}

// ══════════════════════════════════════════
// إدارة الصفحات
// ══════════════════════════════════════════
const pages = { 1: buildPage1, 2: buildPage2, 3: buildPage3, 4: buildPage4 };
const totalSpreads = 2; // فرشتان: (1,2) و (3,4)
let currentSpread = 0;

function getSpreadPages(s) {
  return { right: s*2+1, left: s*2+2 };
}
function toArabicNum(n) {
  return n.toString().replace(/\d/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]);
}
function renderPage(container, pageNum) {
  const numEl = container.querySelector('.page-num');
  container.innerHTML = '';
  if (numEl) container.appendChild(numEl);
  const builder = pages[pageNum];
  if (builder) {
    container.appendChild(builder());
    container.classList.remove('blank-page');
  } else {
    container.classList.add('blank-page');
    const ph = document.createElement('span');
    ph.textContent = `صفحة ${pageNum}`;
    container.appendChild(ph);
  }
}
function renderSpread() {
  const { right, left } = getSpreadPages(currentSpread);
  document.getElementById('right-num').textContent = toArabicNum(right);
  document.getElementById('left-num').textContent  = toArabicNum(left);
  renderPage(document.getElementById('right-page'), right);
  renderPage(document.getElementById('left-page'),  left);
  document.getElementById('btn-prev').disabled = currentSpread === 0;
  document.getElementById('btn-next').disabled = currentSpread >= totalSpreads-1;
  document.getElementById('spread-label').textContent =
    `ص ${toArabicNum(right)}–${toArabicNum(left)}`;
  audioEl.pause(); audioEl.src=''; statusEl.textContent='';
}
function turnPage(dir) { currentSpread += dir; renderSpread(); }

// لوحة المفاتيح
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && currentSpread < totalSpreads-1) turnPage(1);
  if (e.key === 'ArrowRight' && currentSpread > 0)              turnPage(-1);
});

renderSpread();
</script>
